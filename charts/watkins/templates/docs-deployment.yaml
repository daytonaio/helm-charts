apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "watkins.docs.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: docs
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.components.docs.autoscaling.enabled }}
  replicas: {{ .Values.components.docs.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" . | nindent 6 }}
      app.kubernetes.io/component: docs
  template:
    metadata:
      annotations:
      {{- if .Values.components.docs.podAnnotations }}
      {{- include "common.tplvalues.render" (dict "value" .Values.components.docs.podAnnotations "context" $) | nindent 8 }}
      {{- end }}
      labels: {{- include "common.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: docs
        {{- if .Values.components.docs.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" .Values.components.docs.podLabels "context" $) | nindent 8 }}
        {{- end }}
    spec:
      {{- include "watkins.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.components.docs.podSecurityContext.enabled }}
      securityContext: {{- omit .Values.components.docs.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      containers:
        - name: docs
          image: daytonaio/enterprise-docs:32e6d6c
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.components.docs.resources }}
          resources: {{- toYaml .Values.components.docs.resources | nindent 12 }}
          {{- end }}
          env:
            - name: "FUNCTIONS_PORT"
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
