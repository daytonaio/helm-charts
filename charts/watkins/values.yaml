## External Keycloak configuration
## All of these values are only used when keycloak.enabled is set to false
## @param externalKeycloak.url Keycloak URL
##
externalKeycloak:
  url: ""

keycloak:
  enabled: true
  nameOverride: "watkins-keycloak"

  image:
    repository: daytonaio/keycloak
    tag: 22.0.5-daytona.r1-debian-11

  keycloakConfigCli:
    enabled: true
    extraEnvVars:
      - name: IMPORT_VARSUBSTITUTION_ENABLED
        value: "true"
    extraEnvVarsSecret: '{{ printf "%s-config-cli" (include "common.names.fullname" .) }}'
    existingConfigmap: '{{ printf "%s-config-cli" (include "common.names.fullname" .) }}'

  extraVolumes:
    - name: extensions
      emptyDir: {}

  extraVolumeMounts:
    - name: extensions
      mountPath: /opt/bitnami/keycloak/providers

  initContainers:
    - name: themes
      image: daytonaio/keycloak-themes:2.3.1
      securityContext:
        runAsUser: 1001
      command:
        - /bin/sh
        - -c
      args:
        - cp /opt/daytona/keycloak/*.jar /extensions
      volumeMounts:
        - name: extensions
          mountPath: /extensions
    - name: providers
      image: daytonaio/keycloak-extensions:1.1.0
      securityContext:
        runAsUser: 1001
      command:
        - /bin/sh
        - -c
      args:
        - cp /opt/daytona/keycloak/*.jar /extensions
      volumeMounts:
        - name: extensions
          mountPath: /extensions

  production: true
  proxy: edge

  service:
    type: ClusterIP

  auth:
    adminUser: admin
    adminPassword: ""

  postgresql:
    enabled: true
    nameOverride: "watkins-keycloak-postgresql"
    image:
      tag: 15.4.0-debian-11-r54

  extraEnvVars:
    - name: KEYCLOAK_EXTRA_ARGS
      value: --features=token-exchange,admin-fine-grained-authz --spi-connections-http-client-default-disable-trust-manager=true

  extraEnvVarsCM: '{{ printf "%s-env-extra" (include "common.names.fullname" .) }}'

  externalDatabase:
    host: ""
    port: ""
    user: ""
    database: ""
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: ""

rabbitmq:
  enabled: false
  nameOverride: "watkins-rabbitmq"
  persistence:
    enabled: true
  auth:
    username: user
    password: pass
    erlangCookie: secreterlangcookie

redis:
  enabled: false
  nameOverride: "watkins-redis"
  auth:
    enabled: false
  architecture: standalone
