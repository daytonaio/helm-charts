apiVersion: v2
name: watkins
description: Watkins Helm Chart
dependencies:
  - name: common
    version: 2.20.2
    repository: https://charts.bitnami.com/bitnami
  - name: keycloak
    version: 17.3.1
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled
  - name: postgresql
    version: 12.12.10
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.9.2
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: rabbitmq
    version: 11.12.0
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
type: application
version: 2.109.0
appVersion: 8.101.0
