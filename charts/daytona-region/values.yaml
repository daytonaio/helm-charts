# Default values for daytona.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  namespace: "" # If not set, will default to Release.Namespace

# Region name (required) - unique identifier for this region
regionName: ""

# Proxy URL (required) - full URL to the proxy service
# Example: "https://proxy.daytona.example.com" or "http://proxy.daytona.example.com:4000"
proxyUrl: ""

# Base domain for derived hostnames (optional). When set, ssh-gateway defaults SSH_GATEWAY_HOST
# to ssh.<baseDomain> instead of deriving from proxyUrl.
baseDomain: ""

# Snapshot Manager URL (optional) - full URL to the snapshot manager service
# When provided, the region registration will include this URL and the API will return
# snapshotManagerUsername and snapshotManagerPassword credentials for basic auth
# Example: "https://snapshots.daytona.example.com"
snapshotManagerUrl: ""

# Daytona API configuration (required)
daytonaApiUrl: ""   # e.g., "https://api.daytona.io/api"
daytonaApiKey: ""   # API key for authentication

# Service-specific configurations
services:
  proxy:
    # Image configuration
    image:
      registry: docker.io
      repository: daytonaio/daytona-proxy
      tag: "" # Will default to Chart.AppVersion
      pullPolicy: IfNotPresent
    # Service configuration
    service:
      type: ClusterIP
      port: 4000
      annotations: {}
    # Ingress configuration
    # NOTE: Proxy ingress uses wildcard host derived from proxyUrl to support
    # unique subdomains per sandbox. Each sandbox requires its own subdomain.
    # The hostname is extracted from proxyUrl (e.g., proxy.daytona.example.com)
    # and a wildcard pattern (*.proxy.daytona.example.com) is created for sandbox routing.
    ingress:
      enabled: true
      className: "nginx"
      annotations: {}
        #nginx.ingress.kubernetes.io/ssl-redirect: "true"
        #nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        #nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      # Hostname is derived from proxyUrl - this setting is ignored
      hostname: ""
      path: "/"
      pathType: "Prefix"
      # Additional hosts to be added to the ingress record
      extraHosts: []
      # Additional paths to be added to the ingress under the main host
      extraPaths: []
      # Additional TLS configuration for additional hostnames
      extraTls: []
      # Additional ingress rules
      extraRules: []
      # Enable TLS
      tls: true
      # Enable self-signed certificates
      selfSigned: false
      # Custom TLS certificates as secrets
      # NOTE: 'key' and 'certificate' are expected in PEM format
      # NOTE: 'name' should match the secretName used in ingress TLS configuration
      # NOTE: The certificate should cover the proxy hostname and wildcard for sandbox subdomains
      # If it is not set and you're using cert-manager, this is unneeded, as it will create a secret for you with valid certificates
      # If it is not set and you're NOT using cert-manager either, set selfSigned: true to generate self-signed certificates
      # It is also possible to create and manage the certificates outside of this helm chart
      # e.g:
      # secrets:
      #   - name: daytona.example.com-tls
      #     key: |-
      #       -----BEGIN RSA PRIVATE KEY-----
      #       ...
      #       -----END RSA PRIVATE KEY-----
      #     certificate: |-
      #       -----BEGIN CERTIFICATE-----
      #       ...
      #       -----END CERTIFICATE-----
      secrets: []
    # Environment variables
    env:
      # PROXY_DOMAIN and PROXY_PROTOCOL are derived from proxyUrl - no need to set them
      # PROXY_API_KEY is obtained from the registration secret when registration.enabled=true
      COOKIE_DOMAIN: ""  # Optional: override cookie domain (defaults to base domain from proxyUrl)
    # Resource limits and requests
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 64Mi
    # Node selector
    nodeSelector: {}
    # Tolerations
    tolerations: []
    # Affinity
    affinity: {}
    # Annotations
    annotations: {}
    # Pod annotations
    podAnnotations: {}
    # Replica count
    replicaCount: 1
    # Horizontal Pod Autoscaler configuration
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
      # Custom metrics (optional)
      # metrics: []
      # Scaling behavior (optional)
      # behavior:
      #   scaleDown:
      #     stabilizationWindowSeconds: 300
      #     policies:
      #     - type: Percent
      #       value: 50
      #       periodSeconds: 15
      #   scaleUp:
      #     stabilizationWindowSeconds: 0
      #     policies:
      #     - type: Percent
      #       value: 100
      #       periodSeconds: 15
      #     - type: Pods
      #       value: 4
      #       periodSeconds: 15
      #     selectPolicy: Max
      annotations: {}
    # Service account
    serviceAccount:
      create: true
      annotations: {}
      name: ""

  snapshotManager:
    enabled: false
    # Image configuration
    image:
      registry: docker.io
      repository: daytonaio/daytona-snapshot-manager
      tag: ""
      pullPolicy: IfNotPresent
    # Log level (debug, info, warn, error)
    logLevel: "info"
    # Service configuration
    service:
      type: ClusterIP
      port: 5000
      annotations: {}
    # Ingress configuration
    ingress:
      enabled: false
      className: "nginx"
      annotations: {}
      # Hostname for snapshot manager (required when ingress is enabled)
      hostname: ""
      path: "/"
      pathType: "Prefix"
      extraHosts: []
      extraPaths: []
      extraTls: []
      extraRules: []
      tls: true
    # Storage configuration
    storage:
      # S3 storage configuration
      s3:
        # AWS region (required)
        region: ""
        # S3 bucket name (required)
        bucket: ""
        # Static credentials (optional - use if not using IRSA)
        # If not set, the service will use IRSA or instance profile credentials
        accessKey: ""
        secretKey: ""
        # Use existing secret for credentials (optional)
        # Secret must contain keys: accessKey, secretKey
        # existingSecret: "my-s3-credentials"
        # Enable server-side encryption
        encrypt: false
        # Use HTTPS for S3 connections
        secure: true
        # Custom S3 endpoint (for non-AWS S3-compatible storage like MinIO)
        # endpoint: "https://minio.example.com"
        # Root directory within the bucket
        # rootDirectory: "snapshots"
      # Enable delete operations
      deleteEnabled: false
    # Cache configuration
    cache:
      enabled: true
      driver: "inmemory"
    # HTTP server configuration
    http:
      # Port the service listens on
      port: 5000
      # TLS configuration
      tls:
        # Existing secret name containing TLS certificate and key
        # The secret must contain keys: tls.crt and tls.key
        # If set, the certificate and key will be mounted in the pod and
        # environment variables SNAPSHOT_MANAGER_HTTP_TLS_CERTIFICATE and
        # SNAPSHOT_MANAGER_HTTP_TLS_KEY will be set to their paths
        # IMPORTANT: This takes precedence over selfSigned. If secretName is set,
        # selfSigned will be ignored.
        secretName: ""
        # Enable self-signed certificate generation
        # When enabled and secretName is empty, a pre-install/pre-upgrade hook will
        # generate a self-signed CA and certificate with 10 years validity.
        # The certificate will be preserved across upgrades.
        # Works with ArgoCD and GitOps workflows.
        # NOTE: This is ignored if secretName is set.
        selfSigned: false
        # Hostname for the TLS certificate (required when selfSigned is enabled)
        # Supports wildcards (e.g., "*.example.com" or "snapshots.daytona.example.com")
        hostname: ""
    # Additional environment variables
    extraEnv: []
    # Liveness probe configuration
    livenessProbe:
      enabled: true
      path: "/healthz"
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    # Readiness probe configuration
    readinessProbe:
      enabled: true
      path: "/healthz"
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    # Resource limits and requests
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    # Node selector
    nodeSelector: {}
    # Tolerations
    tolerations: []
    # Affinity
    affinity: {}
    # Annotations
    annotations: {}
    # Pod annotations
    podAnnotations: {}
    # Replica count
    replicaCount: 1
    # Service account
    serviceAccount:
      create: true
      annotations: {}
      name: ""

  sshGateway:
    enabled: true
    image:
      registry: docker.io
      repository: daytonaio/daytona-ssh-gateway
      tag: ""
      pullPolicy: IfNotPresent
    service:
      type: LoadBalancer
      port: 2222
      annotations: {}
    apiKey: supersecretapikey
    sshKeys:
      privClientSSHKey: ""
      pubClientSSHKey: ""
      privGatewaySSHKey: ""
    env:
      SSH_GATEWAY_PORT: "2222"
      SSH_GATEWAY_HOST: ""
    extraVolumeMounts: []
    extraVolumes: []
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    annotations: {}
    podAnnotations: {}
    replicaCount: 1
    serviceAccount:
      create: true
      annotations: {}
      name: ""

  runnermanager:
    enabled: true
    image:
      registry: docker.io
      repository: daytonaio/daytona-runner-manager
      tag: "v0.158.4-1-byoc-amd64"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3010
      annotations: {}
    # API_TOKEN (Daytona org Bearer token) is read from a Kubernetes secret — not from env below.
    # Defaults to the same secret as region registration: {fullname}-daytona-api-key (key from registration.secretKeys.apiKey),
    # or registration.existingSecret when set. Override with apiTokenSecret if needed.
    apiTokenSecret:
      name: ""
      key: ""
    # Runner-manager API_KEY (distinct from Daytona org token) must come from a secret you create.
    # Example: kubectl create secret generic my-rm-api-key -n <ns> --from-literal=API_KEY='<value-from-central-daytona>'
    apiKeySecret:
      name: ""
      key: "API_KEY"
    env:
      API_PORT: "3010"
      SYSTEM_API_TOKEN: "system_api_token"
      PROVIDER_TYPE: "kubernetes"
      LOG_LEVEL: "info"
      POD_WAIT_TIMEOUT: "600"
      KUBECONFIG_PATH: ""
      SERVER_URL: ""
      ENVIRONMENT: "production"
      RUNNER_API_PORT: "3000"
      PLACEHOLDER_POD_IMAGE: "registry.k8s.io/pause:3.6"
      # Image used for runner pods spawned by the runner-manager.
      # If empty, defaults to the runner image built from services.runner.image.
      RUNNER_POD_IMAGE: ""
      # ServiceAccount used by runner pods spawned by the runner-manager.
      # If empty, defaults to the runner ServiceAccount created by this chart.
      RUNNER_POD_SERVICE_ACCOUNT: ""
      # ConfigMap mounted into runner pods spawned by the runner-manager.
      # If empty, defaults to the runner ConfigMap created by this chart
      # (<release>-<chart>-runner-config).
      RUNNER_POD_CONFIG_MAP: ""
      # Secret mounted into runner pods spawned by the runner-manager.
      # If empty, defaults to the runner Secret created by this chart
      # (<release>-<chart>-runner-secrets).
      RUNNER_POD_SECRET: ""
      DAYTONA_PRODUCTION_API: "true"
    extraEnv: []
    extraVolumeMounts: []
    extraVolumes: []
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
    annotations: {}
    podAnnotations: {}
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    rbac:
      create: true

  runner:
    enabled: true
    image:
      registry: docker.io
      repository: daytonaio/daytona-runner
      tag: ""
      pullPolicy: IfNotPresent
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    env:
      API_PORT: "3000"
      ENVIRONMENT: "production"
      CONTAINER_RUNTIME: ""
      LOG_FILE_PATH: "/home/daytona/runner/runner.log"
      LOG_LEVEL: "info"
      SSH_GATEWAY_ENABLE: "true"
      SSH_GATEWAY_PORT: "2220"
      RESOURCE_LIMITS_DISABLED: "false"
      CACHE_RETENTION_DAYS: "7"
      DAEMON_START_TIMEOUT_SEC: "30"
      SANDBOX_START_TIMEOUT_SEC: "60"
      DAYTONA_API_URL: ""
      SERVER_URL: ""
      API_TOKEN: "secret_api_token"
      SYSTEM_API_TOKEN: "system_api_token"
      AWS_REGION: ""
      AWS_ENDPOINT_URL: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_DEFAULT_BUCKET: ""
      SSH_PUBLIC_KEY: ""
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
    affinity: {}
    podAnnotations: {}
    hostAliases: []
    registryProxy:
      enabled: false
      image: "alpine/socat:1.7.4.4-r0"
      listenPort: 5000
      targetHost: "registry.external.com"
      targetPort: 443
    dockerInstaller:
      enabled: true
      image: "ubuntu:22.04"
      xfsStorageSize: "50G"
      dns: []
      airgapped:
        enabled: false
        packagesImage: "daytonaio/daytona-runner-packages:v0.0.2"
    extraEnv: []
    extraVolumeMounts: []
    extraVolumes: []

# Region registration configuration
# When enabled, a pre-install hook will call the Daytona API to register this region
# and store the response in a Kubernetes secret for use by other services
registration:
  enabled: true
  # Use an existing secret for API key instead of creating one from daytonaApiKey
  # The secret should contain the API key
  existingSecret: ""
  # Key name in the secret
  secretKeys:
    apiKey: "daytona-api-key"
  # Image for the registration job (needs curl and kubectl)
  image:
    repository: daytonaio/kubectl
    tag: "1.34.2-r2"
    pullPolicy: IfNotPresent
  # Resource limits for the registration job
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # Node selector for the registration job
  nodeSelector: {}
  # Tolerations for the registration job
  tolerations: []

# Global node selector (fallback)
nodeSelector: {}

# Global tolerations (fallback)
tolerations: []

# Global affinity (fallback)
affinity: {}

# Pod security context
podSecurityContext:
  fsGroup: 2000

# Container security context
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 0
